<html lang="fr" class="dark">

    <meta name="theme-color" content="#18181b" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="color-scheme" content="dark light" />

    <title>Cabs · La plateforme pour opérateurs de taxi</title>
    <meta
      name="description"
      content="Cabs consolide vos courses Uber, Bolt et Heetch, calcule les commissions plateforme et vous donne le brut et le net réel. Bêta privée Belgique · France · Pays-Bas, sortie publique septembre 2026."
    />
    <meta name="application-name" content="Cabs" />
    <meta name="author" content="Kristian Vasiaj, Ismael Bouzrouti, Nawfel Ajari" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />

    <link rel="canonical" href="https://www.joincabs.com/" />
    <link rel="alternate" hreflang="fr" href="https://www.joincabs.com/" />
    <link rel="alternate" hreflang="en" href="https://www.joincabs.com/?lang=en" />
    <link rel="alternate" hreflang="nl" href="https://www.joincabs.com/?lang=nl" />
    <link rel="alternate" hreflang="de" href="https://www.joincabs.com/?lang=de" />
    <link rel="alternate" hreflang="x-default" href="https://www.joincabs.com/" />

    <!-- Preload the carousel logo so it shows up the moment the ticker
         mounts, instead of after a network round-trip (perceived as
         "loading" on slow mobile connections). -->
    <link rel="preload" as="image" href="/taxi-logo.png" />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <meta property="og:site_name" content="Cabs" />
    <meta property="og:title" content="Cabs · La plateforme pour opérateurs de taxi" />
    <meta
      property="og:description"
      content="Vos courses Uber, Bolt et Heetch consolidées. Vos commissions calculées. Sans tableur."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.joincabs.com/" />
    <meta property="og:image" content="https://www.joincabs.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:alt" content="Cabs · La plateforme pour opérateurs de taxi" />
    <meta property="og:locale" content="fr_BE" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:locale:alternate" content="nl_BE" />
    <meta property="og:locale:alternate" content="de_DE" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Cabs · La plateforme pour opérateurs de taxi" />
    <meta
      name="twitter:description"
      content="Vos courses Uber, Bolt et Heetch consolidées. Vos commissions calculées. Sans tableur."
    />
    <meta name="twitter:image" content="https://www.joincabs.com/og.png" />
    <meta name="twitter:image:alt" content="Cabs · La plateforme pour opérateurs de taxi" />
    <style>
      /* Initial loader — paints from the HTML, before any JS runs.
         Stays on screen while the bundle downloads + parses on slow
         mobiles. React replaces #root content on mount, which removes
         the loader naturally. The .cabs-spinner uses pure CSS, no
         JS, no GPU filters (zero risk of staying invisible). */
      html, body { background: #0b0b0e; color: #fafafa; margin: 0; }
      .cabs-initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 1;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .cabs-spinner {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 2px solid rgba(250, 204, 21, 0.2);
        border-top-color: #fcd34d;
        animation: cabs-spin 0.8s linear infinite;
      }
      .cabs-loader-label {
        font-size: 12px;
        color: rgba(250, 250, 250, 0.6);
        letter-spacing: 0.2em;
        text-transform: uppercase;
        font-weight: 600;
      }
      @keyframes cabs-spin { to { transform: rotate(360deg); } }
      @media (prefers-color-scheme: light) {
        html, body { background: #ffffff; color: #18181b; }
        .cabs-spinner {
          border-color: rgba(202, 138, 4, 0.2);
          border-top-color: #ca8a04;
        }
        .cabs-loader-label { color: rgba(24, 24, 27, 0.6); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="cabs-initial-loader" aria-label="Loading">
        <div class="cabs-spinner" aria-hidden="true"></div>
        <p class="cabs-loader-label">Cabs</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
